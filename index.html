<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xyla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background:#000;
      overflow:hidden;
      font-family:'DM Sans', sans-serif;
    }

    /* ── FULL SCREEN MIRROR ── */
    #mirror-video {
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      display:block;
    }

    /* Mirror vignette — makes edges darker like a real mirror frame */
    #vignette {
      position:fixed; inset:0;
      background:radial-gradient(
        ellipse 80% 90% at 50% 50%,
        transparent 50%,
        rgba(0,0,0,0.35) 75%,
        rgba(0,0,0,0.75) 92%,
        rgba(0,0,0,0.92) 100%
      );
      pointer-events:none;
      z-index:1;
    }

    /* ── CAMERA OFF STATE ── */
    #no-camera {
      position:fixed; inset:0;
      background:linear-gradient(160deg, #0d0d0d 0%, #1a1410 100%);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      z-index:2;
    }
    #no-camera .big-icon {
      font-size:64px; opacity:0.2;
      animation:float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
    }
    #no-camera p {
      color:rgba(255,255,255,0.25);
      font-size:14px; letter-spacing:2px; text-transform:uppercase;
    }
    #start-btn {
      margin-top:8px;
      background:transparent;
      border:1px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.5);
      padding:12px 32px; border-radius:40px;
      font-family:'DM Sans',sans-serif;
      font-size:12px; letter-spacing:2px; text-transform:uppercase;
      cursor:pointer; transition:all 0.4s;
    }
    #start-btn:hover {
      border-color:rgba(255,255,255,0.4);
      color:rgba(255,255,255,0.9);
      background:rgba(255,255,255,0.04);
    }

    /* ── TOP: CLOCK (always visible, very subtle) ── */
    #top-overlay {
      position:fixed; top:0; left:0; right:0;
      padding:32px 40px 0;
      display:flex; justify-content:space-between; align-items:flex-start;
      z-index:10;
      pointer-events:none;
    }
    #clock {
      font-family:'Cormorant Garamond',serif;
      font-weight:200; font-size:52px; letter-spacing:2px;
      color:rgba(255,255,255,0.75);
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      line-height:1;
    }
    #date {
      font-size:11px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.35); margin-top:4px;
    }

    /* ── XYLA WORDMARK (top right, ambient) ── */
    #wordmark {
      font-family:'Cormorant Garamond',serif;
      font-weight:200; font-style:italic;
      font-size:22px; letter-spacing:6px;
      color:rgba(255,255,255,0.22);
      text-transform:lowercase;
      transition:opacity 0.8s;
    }

    /* ── CENTER LISTENING INDICATOR ── */
    #listening-ring {
      position:fixed;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      z-index:20;
      display:flex; flex-direction:column; align-items:center; gap:20px;
      opacity:0; pointer-events:none;
      transition:opacity 0.5s;
    }
    #listening-ring.active { opacity:1; }

    .ring {
      width:90px; height:90px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.5);
      position:relative;
      animation:ringPulse 1.8s ease-in-out infinite;
    }
    .ring::before {
      content:'';
      position:absolute; inset:-12px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.15);
      animation:ringPulse 1.8s ease-in-out infinite 0.3s;
    }
    .ring::after {
      content:'';
      position:absolute; inset:-24px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.07);
      animation:ringPulse 1.8s ease-in-out infinite 0.6s;
    }
    @keyframes ringPulse {
      0%,100%{ transform:scale(1); opacity:0.7; }
      50%{ transform:scale(1.06); opacity:1; }
    }
    .ring-inner {
      position:absolute; inset:0;
      border-radius:50%;
      background:rgba(255,255,255,0.04);
      display:flex; align-items:center; justify-content:center;
    }
    .ring-dot {
      width:6px; height:6px; border-radius:50%;
      background:rgba(255,255,255,0.8);
      animation:dotBreathe 1.8s ease-in-out infinite;
    }
    @keyframes dotBreathe {
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.4); }
    }
    #listening-label {
      font-size:11px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.45);
    }

    /* ── XYLA SPEAKING: TEXT OVERLAY ── */
    #xyla-speech {
      position:fixed;
      bottom:0; left:0; right:0;
      padding:0 60px 52px;
      z-index:20;
      opacity:0; transform:translateY(10px);
      transition:opacity 0.6s, transform 0.6s;
      pointer-events:none;
    }
    #xyla-speech.visible {
      opacity:1; transform:translateY(0);
    }
    #speech-text {
      font-family:'Cormorant Garamond',serif;
      font-weight:300; font-style:italic;
      font-size:clamp(22px, 3vw, 34px);
      color:rgba(255,255,255,0.92);
      text-align:center;
      line-height:1.5;
      text-shadow:0 2px 30px rgba(0,0,0,0.8);
      max-width:800px; margin:0 auto;
    }
    /* Typing cursor */
    #speech-text::after {
      content:'';
      display:inline-block;
      width:2px; height:1em;
      background:rgba(255,255,255,0.6);
      margin-left:4px; vertical-align:text-bottom;
      animation:blink 1s step-end infinite;
    }
    #speech-text.done::after { display:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Speaker dots — Xyla is talking */
    #speaker-dots {
      display:flex; gap:5px; justify-content:center;
      margin-top:14px; opacity:0;
      transition:opacity 0.3s;
    }
    #speaker-dots.visible { opacity:1; }
    .sdot {
      width:4px; height:4px; border-radius:50%;
      background:rgba(255,255,255,0.45);
      animation:sdotBounce 0.8s ease-in-out infinite;
    }
    .sdot:nth-child(2){animation-delay:.1s}
    .sdot:nth-child(3){animation-delay:.2s}
    .sdot:nth-child(4){animation-delay:.3s}
    .sdot:nth-child(5){animation-delay:.4s}
    @keyframes sdotBounce {
      0%,100%{transform:scaleY(1);opacity:.4}
      50%{transform:scaleY(2.2);opacity:1}
    }

    /* ── BOTTOM: WAKE WORD HINT ── */
    #wake-hint {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%);
      z-index:20;
      font-size:10px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,0.18);
      transition:opacity 0.5s;
      pointer-events:none;
    }
    #wake-hint.hide { opacity:0; }

    /* ── CONTEXT BADGE (top left under clock — shows what Xyla detected) ── */
    #context-badge {
      position:fixed; left:40px; bottom:80px;
      z-index:20;
      opacity:0; transform:translateY(4px);
      transition:all 0.5s;
      pointer-events:none;
    }
    #context-badge.visible { opacity:1; transform:translateY(0); }
    #context-badge span {
      font-size:10px; letter-spacing:2px; text-transform:uppercase;
      color:rgba(255,255,255,0.3);
      border:1px solid rgba(255,255,255,0.12);
      padding:5px 12px; border-radius:20px;
      background:rgba(0,0,0,0.2);
      backdrop-filter:blur(4px);
    }

    /* ── PHOTO FLASH ── */
    #flash {
      position:fixed; inset:0;
      background:#fff; opacity:0;
      pointer-events:none; z-index:50;
      transition:opacity 0.06s;
    }

    /* ── CAPTURED PHOTO PEEK ── */
    #photo-peek {
      position:fixed; bottom:28px; right:36px;
      z-index:20; display:flex; flex-direction:column; gap:5px; align-items:flex-end;
    }
    .peek-img {
      width:58px; height:44px; object-fit:cover;
      border-radius:6px; transform:scaleX(-1);
      border:1px solid rgba(255,255,255,0.15);
      cursor:pointer; transition:all 0.2s;
      box-shadow:0 4px 16px rgba(0,0,0,0.5);
      opacity:0.7;
    }
    .peek-img:hover { opacity:1; transform:scaleX(-1) scale(1.07); }

    /* ── API MODAL ── */
    #modal-bg {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.85);
      backdrop-filter:blur(10px);
      display:flex; align-items:center; justify-content:center;
      z-index:100;
    }
    .modal {
      background:rgba(18,14,10,0.95);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px; padding:44px;
      width:400px; text-align:center;
      box-shadow:0 32px 80px rgba(0,0,0,0.6);
      animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }
    .modal-logo {
      font-family:'Cormorant Garamond',serif;
      font-size:44px; font-weight:200; font-style:italic;
      color:rgba(255,255,255,0.85); letter-spacing:6px; margin-bottom:8px;
    }
    .modal-sub {
      font-size:12px; color:rgba(255,255,255,0.3);
      letter-spacing:1px; margin-bottom:28px; line-height:1.7;
    }
    .modal input {
      width:100%; padding:13px 18px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04);
      color:rgba(255,255,255,0.8);
      font-family:'DM Sans',sans-serif; font-size:13px;
      outline:none; margin-bottom:12px;
      transition:border 0.2s;
      text-align:center; letter-spacing:1px;
    }
    .modal input:focus { border-color:rgba(255,255,255,0.3); }
    .modal input::placeholder { color:rgba(255,255,255,0.2); }
    .modal-btn {
      width:100%; padding:14px; border-radius:40px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.2);
      color:rgba(255,255,255,0.75);
      font-family:'DM Sans',sans-serif; font-size:13px;
      letter-spacing:1.5px; text-transform:uppercase;
      cursor:pointer; transition:all 0.3s; margin-bottom:10px;
    }
    .modal-btn:hover { background:rgba(255,255,255,0.13); color:#fff; border-color:rgba(255,255,255,0.4); }
    .modal-skip {
      font-size:11px; color:rgba(255,255,255,0.2);
      cursor:pointer; letter-spacing:1px;
      transition:color 0.2s;
    }
    .modal-skip:hover { color:rgba(255,255,255,0.45); }
  </style>
</head>
<body>

<!-- SETUP MODAL -->
<div id="modal-bg">
  <div class="modal">
    <div class="modal-logo">xyla</div>
    <div class="modal-sub">Your mirror is ready.<br>Add an AI key to unlock the full experience,<br>or explore the demo first.</div>
    <input type="password" id="api-in" placeholder="Anthropic API key (optional)"/>
    <button class="modal-btn" onclick="init()">Activate Mirror ›</button>
    <div class="modal-skip" onclick="initDemo()">Continue without AI</div>
  </div>
</div>

<!-- MIRROR -->
<video id="mirror-video" autoplay playsinline muted></video>
<div id="vignette"></div>

<!-- NO CAMERA STATE -->
<div id="no-camera" style="display:none">
  <div class="big-icon">🪞</div>
  <p>Mirror offline</p>
  <button id="start-btn" onclick="startMirror()">Enable Mirror</button>
</div>

<!-- TOP OVERLAY -->
<div id="top-overlay">
  <div>
    <div id="clock">00:00</div>
    <div id="date">Sunday</div>
  </div>
  <div id="wordmark">xyla</div>
</div>

<!-- LISTENING RING -->
<div id="listening-ring">
  <div class="ring">
    <div class="ring-inner">
      <div class="ring-dot"></div>
    </div>
  </div>
  <div id="listening-label">Listening…</div>
</div>

<!-- XYLA SPEECH -->
<div id="xyla-speech">
  <div id="speech-text"></div>
  <div id="speaker-dots">
    <div class="sdot"></div><div class="sdot"></div>
    <div class="sdot"></div><div class="sdot"></div><div class="sdot"></div>
  </div>
</div>

<!-- WAKE HINT -->
<div id="wake-hint">Say · Xyla · to begin</div>

<!-- CONTEXT BADGE -->
<div id="context-badge"><span id="context-text">Reading your look…</span></div>

<!-- FLASH -->
<div id="flash"></div>

<!-- PHOTO THUMBNAILS -->
<div id="photo-peek"></div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let apiKey = null, demoMode = true;
let camStream = null;
let isListening = false, recog = null;
let isSpeaking = false;
let history = [];
let photoCount = 0;
let contextMode = 'idle'; // idle | makeup | outfit | chat
let contextTimer = null;
let autoAnalysisTimer = null;
let speechTimeout = null;

// ── DEMO responses by context ──
const DEMO = {
  outfit: [
    "That combination is working really well — the proportions feel balanced and intentional. One thing to consider: your footwear will make or break this. What are you pairing it with?",
    "The silhouette looks clean. If you want to elevate it, one accessory — something around your wrist or neck — will finish the look completely.",
    "Good structure. The colours are cohering nicely. You could push this further with a bolder lip or a contrasting layer, but honestly — you're already there.",
  ],
  makeup: [
    "Your base looks really even from here. Just check the edges near your hairline — make sure everything's blended through. The rest looks polished.",
    "The eye work is strong — especially the outer corner. One thing I'd look at is the under-eye area on your right side. A small blend and it's perfect.",
    "You're looking glowing. Lips are clean, coverage is good. If you want to intensify anything, the cheekbone highlight would give you a nice finish.",
  ],
  chat: [
    "I'm here. What do you need?",
    "You're looking good. What's on your mind?",
    "Tell me more — I'm listening.",
    "That's a great question. Let me think through that with you.",
  ],
  greeting: [
    "Good morning. You're looking well-rested.",
    "Hey. Glad you're here.",
    "Welcome back. Let's get you ready.",
    "Good evening. You're looking sharp.",
  ],
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  const k = document.getElementById('api-in').value.trim();
  if (k && (k.startsWith('sk-ant-') || k.startsWith('sk-'))) {
    apiKey = k; demoMode = false;
  }
  document.getElementById('modal-bg').style.display = 'none';
  startMirror();
}

function initDemo() {
  document.getElementById('modal-bg').style.display = 'none';
  startMirror();
}

// ══════════════════════════════════════════
// MIRROR + CAMERA
// ══════════════════════════════════════════
async function startMirror() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: 'user' },
      audio: false
    });
    const v = document.getElementById('mirror-video');
    v.srcObject = camStream;
    document.getElementById('no-camera').style.display = 'none';

    // Clock
    startClock();

    // Wait for video to actually load, then greet
    v.onloadedmetadata = () => {
      setTimeout(() => greetUser(), 1200);
      // Start context detection loop
      setTimeout(() => startContextLoop(), 3000);
    };

    // Setup voice
    setupVoice();

  } catch (e) {
    document.getElementById('no-camera').style.display = 'flex';
    // Still run clock and voice
    startClock();
    setupVoice();
    // Greet anyway (no vision)
    setTimeout(() => greetUser(), 1000);
  }
}

// ══════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════
function startClock() {
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  function tick() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
    document.getElementById('date').textContent = DAYS[n.getDay()] + ', ' + n.getDate() + ' ' + MONTHS[n.getMonth()];
  }
  tick(); setInterval(tick, 15000);
}

// ══════════════════════════════════════════
// GREETING (Xyla wakes up)
// ══════════════════════════════════════════
function greetUser() {
  const hour = new Date().getHours();
  let greeting;
  if (hour < 12) greeting = DEMO.greeting[0];
  else if (hour < 17) greeting = DEMO.greeting[1];
  else greeting = DEMO.greeting[2];

  xylaSpeak(greeting);
}

// ══════════════════════════════════════════
// XYLA SPEAKS
// Shows text on screen + animates
// ══════════════════════════════════════════
function xylaSpeak(text, duration = null) {
  isSpeaking = true;

  const speechEl = document.getElementById('xyla-speech');
  const textEl = document.getElementById('speech-text');
  const dots = document.getElementById('speaker-dots');
  const wakeHint = document.getElementById('wake-hint');

  // Hide wake hint while speaking
  wakeHint.classList.add('hide');

  // Show dots (speaking)
  dots.classList.add('visible');
  textEl.classList.remove('done');
  textEl.textContent = '';
  speechEl.classList.add('visible');

  // Type out the text
  let i = 0;
  const speed = 28; // ms per character
  clearInterval(window._typeInterval);
  window._typeInterval = setInterval(() => {
    textEl.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(window._typeInterval);
      textEl.classList.add('done');
      dots.classList.remove('visible');
      isSpeaking = false;

      // Hide after a pause
      const displayTime = duration || Math.max(3000, text.length * 55);
      clearTimeout(speechTimeout);
      speechTimeout = setTimeout(() => {
        speechEl.classList.remove('visible');
        wakeHint.classList.remove('hide');
      }, displayTime);
    }
  }, speed);

  // Browser TTS
  speakTTS(text);
}

function speakTTS(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92; utt.pitch = 1.0; utt.volume = 1.0;
  // Pick a natural voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.includes('Samantha') || v.name.includes('Google UK') ||
    v.name.includes('Karen') || v.name.includes('Serena') ||
    v.lang === 'en-GB' || v.lang === 'en-ZA'
  ) || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utt.voice = preferred;
  window.speechSynthesis.speak(utt);
}

// ══════════════════════════════════════════
// CONTEXT DETECTION (what is user doing?)
// ══════════════════════════════════════════
function startContextLoop() {
  // Every 8 seconds, silently analyse what the user is doing
  autoAnalysisTimer = setInterval(detectContext, 8000);
}

async function detectContext() {
  if (isListening || isSpeaking || !camStream) return;

  const img = await captureFrame(0.4); // low quality for speed
  if (!img) return;

  if (demoMode || !apiKey) {
    // Demo: randomly set context to show how it works
    const contexts = ['outfit','makeup','outfit','idle'];
    const picked = contexts[Math.floor(Math.random() * contexts.length)];
    if (picked !== 'idle') showContextBadge(picked);
    return;
  }

  // Ask Claude what the user is doing
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 30,
        system: 'You are a context detector for a smart mirror. Look at the image and respond with ONLY one word: "makeup" if the person appears close to the mirror doing makeup/grooming, "outfit" if they are standing back showing their clothing/body, "selfie" if they are posing for a photo, or "idle" if unclear.',
        messages: [{ role:'user', content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:img}},{type:'text',text:'What is this person doing?'}] }]
      })
    });
    const d = await res.json();
    const ctx = d.content?.[0]?.text?.trim().toLowerCase() || 'idle';
    if (ctx !== 'idle') {
      contextMode = ctx;
      showContextBadge(ctx);
    }
  } catch {}
}

function showContextBadge(ctx) {
  const badge = document.getElementById('context-badge');
  const label = { makeup: 'Makeup mode', outfit: 'Outfit check', selfie: 'Say Xyla for a photo', chat: 'Listening' };
  document.getElementById('context-text').textContent = label[ctx] || ctx;
  badge.classList.add('visible');
  clearTimeout(contextTimer);
  contextTimer = setTimeout(() => badge.classList.remove('visible'), 5000);
}

// ══════════════════════════════════════════
// VOICE — WAKE WORD + CONVERSATION
// ══════════════════════════════════════════
function setupVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    // Fallback: tap anywhere on screen
    document.addEventListener('click', (e) => {
      if (e.target.closest('#modal-bg') || e.target.closest('.peek-img')) return;
      activateListening();
    });
    return;
  }

  startContinuousListening();
}

function startContinuousListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  recog = new SR();
  recog.continuous = true;
  recog.interimResults = false;
  recog.lang = 'en-ZA';
  recog.maxAlternatives = 1;

  recog.onresult = (e) => {
    const transcript = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();

    // Wake word detection
    if (transcript.includes('xyla') || transcript.includes('zyla') || transcript.includes('kyla')) {
      // Extract message after the wake word
      const wakeIdx = Math.max(
        transcript.indexOf('xyla'),
        transcript.indexOf('zyla'),
        transcript.indexOf('kyla')
      );
      const after = transcript.slice(wakeIdx + 5).trim();

      if (after.length > 2) {
        // They said "Xyla [command]" in one go
        handleCommand(after);
      } else {
        // Just "Xyla" — activate and wait for next input
        activateListening();
      }
    }
  };

  recog.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setTimeout(() => startContinuousListening(), 1000);
    }
  };

  recog.onend = () => {
    if (!isListening) {
      // Auto-restart background listening
      setTimeout(() => startContinuousListening(), 300);
    }
  };

  try { recog.start(); } catch {}
}

function activateListening() {
  if (isListening || isSpeaking) return;
  isListening = true;

  // Stop continuous listener
  try { recog?.stop(); } catch {}

  // Show ring
  document.getElementById('listening-ring').classList.add('active');
  document.getElementById('wake-hint').classList.add('hide');

  // Hide any current speech
  document.getElementById('xyla-speech').classList.remove('visible');

  // TTS cancel
  window.speechSynthesis?.cancel();

  // Start single-shot listener
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    // Keyboard fallback in demo mode
    const text = prompt('Say something to Xyla:');
    if (text) handleCommand(text);
    deactivateListening();
    return;
  }

  const singleRecog = new (SR)();
  singleRecog.lang = 'en-ZA';
  singleRecog.continuous = false;
  singleRecog.interimResults = false;

  singleRecog.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    deactivateListening();
    if (text) handleCommand(text);
  };

  singleRecog.onerror = () => {
    deactivateListening();
    xylaSpeak("Sorry, I didn't catch that. Try again.");
  };

  singleRecog.onend = () => {
    if (isListening) {
      deactivateListening();
    }
  };

  try { singleRecog.start(); } catch { deactivateListening(); }

  // Timeout after 8s
  setTimeout(() => {
    if (isListening) {
      try { singleRecog.stop(); } catch {}
      deactivateListening();
      xylaSpeak("I'm still here whenever you need me.");
    }
  }, 8000);
}

function deactivateListening() {
  isListening = false;
  document.getElementById('listening-ring').classList.remove('active');
  document.getElementById('wake-hint').classList.remove('hide');
  // Restart background listening
  setTimeout(() => startContinuousListening(), 500);
}

// ══════════════════════════════════════════
// COMMAND HANDLING
// ══════════════════════════════════════════
async function handleCommand(text) {
  const t = text.toLowerCase();

  // Photo command
  if (t.includes('photo') || t.includes('picture') || t.includes('capture') || t.includes('selfie')) {
    await takePhoto();
    return;
  }

  // Get vision context
  const img = await captureFrame(0.65);

  if (demoMode || !apiKey) {
    // Demo: use context-aware responses
    let pool;
    if (t.includes('outfit') || t.includes('wearing') || t.includes('clothes') || t.includes('dress') || contextMode === 'outfit') pool = DEMO.outfit;
    else if (t.includes('makeup') || t.includes('face') || t.includes('look') || contextMode === 'makeup') pool = DEMO.makeup;
    else pool = DEMO.chat;

    const resp = pool[Math.floor(Math.random() * pool.length)];
    xylaSpeak(resp);
    return;
  }

  // Real Claude call with vision
  await askClaude(text, img);
}

async function askClaude(userText, img = null) {
  const hour = new Date().getHours();
  const timeCtx = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';

  const system = `You are Xyla — a smart, warm, perceptive AI mirror. You speak to the person standing in front of you. You see them through the camera.

Your voice is calm, direct, and confident — like a trusted stylist. Not a chatbot. Not a robot. A mirror that actually sees you.

Rules:
- Keep responses SHORT. 1–3 sentences. This is spoken, not read.
- If you can see them (image provided), comment on what you specifically see — be precise.
- If they're checking makeup, focus on makeup details.
- If they're checking an outfit, focus on the outfit.
- If they just want to chat, be warm and conversational.
- Never say "I can see in the image" — just say what you see naturally.
- Never be generic. Always be specific to what is actually in front of you.
- It is ${timeCtx}.`;

  const content = img
    ? [{ type:'image', source:{ type:'base64', media_type:'image/jpeg', data:img } }, { type:'text', text: userText }]
    : userText;

  history.push({ role:'user', content });
  if (history.length > 20) history = history.slice(-20);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:180,
        system,
        messages: history
      })
    });

    const data = await res.json();
    if (data.error) { xylaSpeak("Something went wrong. Try again."); return; }
    const reply = data.content[0].text;
    history.push({ role:'assistant', content: reply });
    xylaSpeak(reply);
  } catch {
    xylaSpeak("I lost connection for a moment. Try again.");
  }
}

// ══════════════════════════════════════════
// PHOTO CAPTURE
// ══════════════════════════════════════════
async function takePhoto() {
  const v = document.getElementById('mirror-video');
  if (!camStream) {
    xylaSpeak("I need the camera to take a photo.");
    return;
  }

  // Flash
  const fl = document.getElementById('flash');
  fl.style.opacity = '0.85';
  setTimeout(() => fl.style.opacity = '0', 120);

  const c = document.createElement('canvas');
  c.width = v.videoWidth || 1280;
  c.height = v.videoHeight || 720;
  const ctx = c.getContext('2d');
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(v, -c.width, 0, c.width, c.height); ctx.restore();

  const img = document.createElement('img');
  img.src = c.toDataURL('image/jpeg', 0.92);
  img.className = 'peek-img';
  img.title = 'Tap to save';
  img.onclick = () => {
    const a = document.createElement('a');
    a.href = img.src;
    a.download = 'xyla_' + Date.now() + '.jpg';
    a.click();
  };

  document.getElementById('photo-peek').prepend(img);
  const all = document.querySelectorAll('.peek-img');
  if (all.length > 3) all[all.length - 1].remove();

  photoCount++;
  xylaSpeak("Got it. Tap the photo in the corner to save it.");
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
async function captureFrame(quality = 0.7) {
  const v = document.getElementById('mirror-video');
  if (!camStream || !v.videoWidth) return null;
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  const ctx = c.getContext('2d');
  ctx.save(); ctx.scale(-1,1); ctx.drawImage(v, -c.width, 0, c.width, c.height); ctx.restore();
  return c.toDataURL('image/jpeg', quality).split(',')[1];
}
